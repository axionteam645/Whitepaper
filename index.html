<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AXION Whitepaper</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter;
  background:#040814;
  color:#fff;
  overflow-x:hidden;
}

/* ===== NAV ===== */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
}

.nav-links{
  display:flex;
  gap:16px;
}

/* ===== HERO ===== */
.hero{
  padding:60px 20px;
}

.hero h1{
  font-size:42px;
}

/* ===== GRID ===== */
.whitepaper-nav{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  padding:20px;
}

/* ===== CARD ===== */
.card{
  padding:20px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
}

/* ===== MOBILE FIX ===== */
@media(max-width:1024px){
  .whitepaper-nav{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:768px){

  /* NAV FIX */
  .nav{
    flex-direction:column;
    gap:12px;
    text-align:center;
  }

  .nav-links{
    flex-wrap:wrap;
    justify-content:center;
  }

  /* HERO FIX */
  .hero{
    padding:40px 16px;
  }

  .hero h1{
    font-size:32px;
    line-height:1.1;
  }

  /* GRID FIX */
  .whitepaper-nav{
    grid-template-columns:1fr;
    gap:14px;
    padding:16px;
  }

  /* CARD FIX */
  .card{
    padding:16px;
  }

  /* TEXT FIX */
  p{
    font-size:14px;
    line-height:1.6;
  }

  /* BUTTON FULL WIDTH */
  .btn{
    width:100%;
    text-align:center;
  }
}

/* EXTRA SMALL */
@media(max-width:480px){
  .hero h1{
    font-size:26px;
  }
}
</style>
</head>

<body>

<div class="nav">
  <div>AXION</div>
  <div class="nav-links">
    <a>Home</a>
    <a>Whitepaper</a>
    <a>Roadmap</a>
  </div>
</div>

<section class="hero">
  <h1>AXION Whitepaper</h1>
</section>

<div class="whitepaper-nav">

  <div class="card">Executive Summary</div>
  <div class="card">System Architecture</div>
  <div class="card">Smart Contract</div>
  <div class="card">Transfer</div>
  <div class="card">Tokenomics</div>
  <div class="card">Security</div>

</div>

</body>
</html>
