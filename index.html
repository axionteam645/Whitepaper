  <style>
    :root{
      --bg:#040814;
      --text:#ecf3ff;
      --muted:#99a8c7;
      --cyan:#4ed8ff;
      --blue:#5f8cff;
      --purple:#a85cff;
      --pink:#ff5cb8;
      --gold:#ffc95c;
      --green:#43f3b1;
      --shadow:0 18px 60px rgba(0,0,0,.42);
      --max:1280px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(78,216,255,.16), transparent 24%),
        radial-gradient(circle at 80% 10%, rgba(168,92,255,.15), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(255,92,184,.08), transparent 28%),
        linear-gradient(180deg,#02050e 0%, #040814 36%, #060b1a 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 12% 18%, rgba(79,168,255,.18), transparent 18%),
        radial-gradient(circle at 90% 12%, rgba(255,92,184,.12), transparent 15%),
        radial-gradient(circle at 86% 88%, rgba(78,216,255,.08), transparent 20%);
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:radial-gradient(rgba(255,255,255,.65) .7px, transparent .7px);
      background-size:38px 38px;
      opacity:.08;
      z-index:-1;
    }

    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}
    .container{
      width:min(calc(100% - 32px), var(--max));
      margin-inline:auto;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(18px);
      background:rgba(4,9,20,.66);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .nav{
      width:min(calc(100% - 32px), var(--max));
      margin-inline:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      min-height:82px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
      flex-shrink:0;
    }

    .brand-mark{
      width:46px;
      height:46px;
      border-radius:50%;
      overflow:hidden;
      display:grid;
      place-items:center;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.03)),
        linear-gradient(135deg, var(--cyan), var(--blue), var(--purple), var(--pink), var(--gold));
      box-shadow:
        0 0 0 1px rgba(255,255,255,.08),
        0 0 30px rgba(112,118,255,.18);
    }

    .brand-mark img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .brand-text strong{
      display:block;
      font-size:18px;
      letter-spacing:.08em;
    }

    .brand-text small{
      display:block;
      color:#d3def8;
      opacity:.9;
      letter-spacing:.12em;
      font-size:10px;
      font-weight:700;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .nav-links{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      flex:1;
      flex-wrap:wrap;
    }

    .nav-links a{
      font-size:12px;
      font-weight:700;
      color:#cbd8f7;
      transition:.2s ease;
      white-space:nowrap;
    }

    .nav-links a:hover{color:#fff}

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:14px 22px;
      font-size:14px;
      font-weight:800;
      font-family:inherit;
      transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
      color:#09111f;
      background:linear-gradient(90deg, #ffd84d, #ffc95c, #ffb347);
      box-shadow:0 10px 26px rgba(255,201,92,.30);
    }

    .btn:hover{transform:translateY(-2px) scale(1.025)}

    .hero{
      padding:86px 0 40px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:28px;
      align-items:start;
    }

      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
